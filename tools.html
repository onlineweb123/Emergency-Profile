<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools - Emergency Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .tools-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .tool-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s transform, 0.3s box-shadow;
            border: 2px solid transparent;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #3498db;
        }

        .tool-card i {
            font-size: 40px;
            margin-bottom: 15px;
            color: #3498db;
        }

        .tool-card h3 {
            font-size: 18px;
            font-weight: 600;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Color Variations */
        .qr-card i { color: #27ae60; }
        .embed-card i { color: #e67e22; }

    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="header">
        <h1>Our Tools</h1>
        <p>Please select a tool to proceed</p>
    </div>

    <div class="tools-container">
        <a href="qr code.html" class="tool-card qr-card">
            <i class="fas fa-qrcode"></i>
            <h3>QR Code Generator</h3>
        </a>

        <a href="embed photo.html" class="tool-card embed-card">
            <i class="fas fa-images"></i>
            <h3>Embed your Google Drive photo link</h3>
        </a>
    </div>

</body>
</html>
