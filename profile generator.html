<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Profile Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }
        h2 { color: #2c3e50; text-align: center; }
        h3 { color: #2980b9; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        
        .add-contact-flex {
            display: flex;
            gap: 10px;
        }
        .btn-add {
            background-color: #27ae60;
            color: white;
            width: 80px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #contact-list {
            margin-top: 10px;
            list-style: none;
            padding: 0;
        }
        .contact-item {
            background: #f8f9fa;
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }
        .remove-btn {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: none;
            font-size: 18px;
        }

        button.btn-generate {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            background-color: #3498db;
            color: white;
            transition: 0.3s;
        }
        button.btn-generate:hover { background-color: #2980b9; }

        .btn-copy { 
            background-color: #2ecc71; 
            color: white; 
            display: none; 
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        #output-container {
            width: 100%;
            max-width: 600px;
            display: none;
        }
        #result-code {
            width: 100%;
            height: 300px;
            margin-top: 10px;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            overflow-y: auto;
            border: 2px solid #34495e;
        }
        .family-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Profile Generator</h2>
    
    <div class="input-group">
        <label>Name:</label>
        <input type="text" id="name" placeholder="e.g. Mathavan">
    </div>

    <div class="input-group">
        <label>Profile Image (File Name or Link):</label>
        <input type="text" id="profile_img" placeholder="e.g. photo.jpg or Link">
    </div>

    <div class="input-group">
        <label>Blood Group:</label>
        <input type="text" id="blood" placeholder="e.g. A1+">
    </div>

    <div class="input-group">
        <label>Emergency Contacts:</label>
        <div class="add-contact-flex">
            <input type="tel" id="contact-input" placeholder="Type number here">
            <button type="button" class="btn-add" onclick="addContact()">Add</button>
        </div>
        <ul id="contact-list"></ul>
    </div>

    <h3>Family Phone Numbers</h3>
    <p style="font-size: 12px; color: #7f8c8d;">(Leave empty if not applicable)</p>
    <div class="family-grid">
        <div class="input-group">
            <label>Father:</label>
            <input type="text" id="father" placeholder="Number">
        </div>
        <div class="input-group">
            <label>Mother:</label>
            <input type="text" id="mother" placeholder="Number">
        </div>
        <div class="input-group">
            <label>Brother:</label>
            <input type="text" id="brother" placeholder="Number">
        </div>
        <div class="input-group">
            <label>Sister:</label>
            <input type="text" id="sister" placeholder="Number">
        </div>
        <div class="input-group">
            <label>Husband:</label>
            <input type="text" id="husband" placeholder="Number">
        </div>
        <div class="input-group">
            <label>Wife:</label>
            <input type="text" id="wife" placeholder="Number">
        </div>
    </div>

    <div class="input-group">
        <label>Address:</label>
        <textarea id="address" rows="3" placeholder="Enter full address..."></textarea>
    </div>

    <div class="input-group">
        <label>Medical History / Remarks:</label>
        <textarea id="medical" rows="3" placeholder="Allergies, Medications, etc..."></textarea>
    </div>

    <button class="btn-generate" onclick="generateCode()">Finish & Get HTML Code</button>
</div>

<div id="output-container">
    <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">Copy Code</button>
    <div id="result-code"></div>
</div>

<script>
    let contactsArray = [];

    function addContact() {
        const input = document.getElementById('contact-input');
        const number = input.value.trim();
        if (number !== "") {
            contactsArray.push(number);
            updateContactList();
            input.value = "";
            input.focus();
        }
    }

    function removeContact(index) {
        contactsArray.splice(index, 1);
        updateContactList();
    }

    function updateContactList() {
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        contactsArray.forEach((num, index) => {
            list.innerHTML += `<li class="contact-item">${num} <button class="remove-btn" onclick="removeContact(${index})">✖</button></li>`;
        });
    }

    function generateCode() {
        const name = document.getElementById('name').value || "User Name";
        const imgPath = document.getElementById('profile_img').value || "profile.jpg";
        const blood = document.getElementById('blood').value || "Not Set";
        const address = document.getElementById('address').value || "Not Provided";
        const medical = document.getElementById('medical').value || "None";

        // Logic for filtering family members
        const familyMembers = [
            { label: 'Father', val: document.getElementById('father').value },
            { label: 'Mother', val: document.getElementById('mother').value },
            { label: 'Brother', val: document.getElementById('brother').value },
            { label: 'Sister', val: document.getElementById('sister').value },
            { label: 'Husband', val: document.getElementById('husband').value },
            { label: 'Wife', val: document.getElementById('wife').value }
        ];

        let familyHtml = "";
        familyMembers.forEach(m => {
            if(m.val.trim() !== "") {
                familyHtml += `      <p><strong>${m.label}:</strong> ${m.val}</p>\n`;
            }
        });

        let emergencyLi = '';
        contactsArray.forEach(num => {
            emergencyLi += `        <li>${num}</li>\n`;
        });

        const finalCode = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Profile - ${name}</title>
  <style>
    body { margin: 0; padding: 0; background: linear-gradient(to right, #e0ecf4, #f7fafd); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #ffffff; padding: 30px; border-radius: 25px; width: 400px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); }
    .profile-pic { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #3498db; margin: 0 auto; display: block; }
    .title { text-align: center; font-size: 22px; font-weight: bold; margin-top: 15px; color: #2c3e50; }
    .section { background: #f9f9f9; margin-top: 20px; border-radius: 15px; padding: 15px 20px; box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.05); }
    .section h3 { margin-top: 0; font-size: 18px; color: #2980b9; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-bottom: 10px; }
    .section p, .section li { margin: 6px 0; font-size: 15px; color: #333; }
    .section ul { padding-left: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="${imgPath}" alt="Profile" class="profile-pic">
    <div class="title">Name : ${name}</div>
    <div class="section">
      <h3>Blood Group</h3>
      <p>${blood}</p>
    </div>
    <div class="section">
      <h3>Emergency Contacts</h3>
      <ul>
${emergencyLi || '        <li>Not Provided</li>'}      </ul>
    </div>
    <div class="section">
      <h3>Family Numbers</h3>
${familyHtml || '      <p>No family contacts provided.</p>'}    </div>
    <div class="section">
      <h3>Address</h3>
      <p>${address}</p>
    </div>
    <div class="section">
      <h3>Medical History</h3>
      <p>${medical}</p>
    </div>
  </div>
</body>
</html>`;

        document.getElementById('result-code').innerText = finalCode;
        document.getElementById('output-container').style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyToClipboard() {
        const text = document.getElementById('result-code').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("HTML Code Copied to Clipboard!");
        });
    }
</script>

</body>
</html>
