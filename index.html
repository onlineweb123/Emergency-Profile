<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
            overflow: hidden;
        }

        /* Toggle Button */
        .toggle-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
            background: #2c3e50;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
        }

        /* Share Button */
        .share-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 1001;
            background: #3498db;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            display: none; /* ஆரம்பத்தில் மறைத்து வைக்கப்படும் */
            border: none;
            transition: 0.3s;
        }

        /* Floating Tool Button */
        .tools-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: #e67e22;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1001;
            text-decoration: none;
            transition: 0.3s transform;
        }

        .tools-fab:hover {
            transform: scale(1.1);
            background-color: #d35400;
        }

        /* Side Bar Styles */
        .sidebar {
            width: 300px;
            height: 100%;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: -300px; 
            transition: 0.3s;
            z-index: 1000;
            border-right: 1px solid #ddd;
        }

        .sidebar.active {
            left: 0; 
        }

        .sidebar-header {
            padding: 20px;
            padding-top: 60px;
            background-color: #1a252f;
            text-align: center;
        }

        .search-container {
            padding: 15px;
        }

        .search-container input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        .profile-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .profile-list li {
            border-bottom: 1px solid #34495e;
        }

        .profile-list a {
            display: block;
            padding: 15px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }

        .profile-list a:hover {
            background-color: #34495e;
            color: #3498db;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            width: 100%;
            height: 100vh;
        }

        #contentFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <button class="share-btn" id="shareBtn" onclick="shareProfile()">
        <i class="fas fa-share-alt"></i> Share
    </button>

    <a href="tools.html" class="tools-fab" id="toolsBtn">
        <i class="fas fa-tools"></i>
    </a>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Emergency Profiles</h3>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="filterNames()" placeholder="Search names...">
        </div>

        <ul class="profile-list" id="profileList">
            <li><a onclick="loadProfile('mathavan.html', 'Mathavan')"><i class="fas fa-user-shield"></i> Mathavan</a></li>
            <li><a onclick="loadProfile('sapari.html', 'Sapari')"><i class="fas fa-user"></i> Sapari</a></li>
            <li><a onclick="loadProfile('santhosh.html', 'Santhosh')"><i class="fas fa-user"></i> Santhosh</a></li>
            <li><a onclick="loadProfile('guest.html', 'Guest')"><i class="fas fa-user"></i> Guest User</a></li>
        </ul>
    </div>

    <div class="main-content">
        <iframe src="about:blank" id="contentFrame" name="contentFrame"></iframe>
    </div>

    <script>
        let currentProfileUrl = "";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function loadProfile(url, name) {
            document.getElementById('contentFrame').src = url;

            // URL தயார் செய்தல்
            currentProfileUrl = window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + url;

            // Profile திறந்தவுடன்: Share காட்டு, Tool பட்டனை மறை
            document.getElementById('shareBtn').style.display = "block";
            document.getElementById('toolsBtn').style.display = "none";

            toggleSidebar();
        }

        async function shareProfile() {
            if (!currentProfileUrl) return;

            try {
                await navigator.clipboard.writeText(currentProfileUrl);
                alert("Link copied to clipboard!");
            } catch (err) {
                console.error("Copy failed", err);
            }

            if (navigator.share) {
                navigator.share({
                    title: 'Emergency Profile',
                    text: 'Check out this profile:',
                    url: currentProfileUrl
                }).catch(console.error);
            }
        }

        function filterNames() {
            let input = document.getElementById('searchInput');
            let filter = input.value.toUpperCase();
            let ul = document.getElementById("profileList");
            let li = ul.getElementsByTagName('li');

            for (let i = 0; i < li.length; i++) {
                let a = li[i].getElementsByTagName("a")[0];
                let txtValue = a.textContent || a.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    li[i].style.display = "";
                } else {
                    li[i].style.display = "none";
                }
            }
        }

        window.onload = function() {
            const frame = document.getElementById('contentFrame').contentWindow.document;
            frame.open();
            frame.write('<body style="display:flex; justify-content:center; align-items:center; height:90vh; font-family:sans-serif; color:#777;"><h2>Open Your Sidebar</h2></body>');
            frame.close();
            
            // ஆரம்பத்தில் Tool பட்டன் தெரியும், Share பட்டன் மறையும்
            document.getElementById('toolsBtn').style.display = "flex";
            document.getElementById('shareBtn').style.display = "none";
        };
    </script>

</body>
</html>
